# Dependabot config: keeps the bridge container's npm deps fresh.
# Root has zero deps so no entry is needed there. Add a `github-actions`
# block if/when this repo grows more workflows.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/mcp-server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
